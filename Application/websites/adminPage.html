<!--home page of our website, for now a test button is added to test if it connects to our sql database-->
<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="/styles/adminstyle.css">
    <title>KStateReservations</title>
    <header class="header">
        <div class="leftHeader">
            <img src="/websitePics/Kansas-State-Wildcats-logo.png" alt="KStateLogo" width="60" height="30">
            <div class="dividerLine"></div>
            <h1>Carl R. Ice College of Engineering</h1>
        </div>
        
    </header>

    <body>
        <div class="container">
            <img class="engPhoto" src="/websitePics/inside-eng-budiling.jpg" height="150px">
            <h1 class="engPhotoText">Admin Page</h1>
        <button class="logOut" onclick="logOut()">Log Out</button>
        <div class="inputContainer">
        <div class="studentCreator">
        <h2 class="resText">Add Student</h2>

        <input class="input" type="text" id="firstName" placeholder="First Name"><br>
        <input class="input" type="text" id="lastName" placeholder="Last Name"><br>
        <input class="input" type="number" id="majorId" placeholder="Major ID (1-10)(optional)" min="1" max="10"><br>
        <input class="input" type="email" id="email" placeholder="Email"><br>
        <input class="input" type="password" id="password" placeholder="Password"><br>
        <label>
            <input class="isAdmin" type="checkbox" id="isAdmin"> Is Admin
        </label><br><br>

        <button  class="studentBtn" id="addStudentBtn">Add Student</button>

        <p class="adminOutput" id="adminOutput"></p>
    </div>

    <div class="laptopCreator">
        <h2 class="resText">Add Laptop</h2>

        <input class="input" type="text" id="laptopMake" placeholder="Laptop Make"><br>
        <input class="input" type="text" id="laptopModel" placeholder="Laptop Model"><br>

        <label>Date Activated:</label><br>
        <input class="input" type="datetime-local" id="dateActivated"><br>

        <label>Date Deactivated (optional):</label><br>
        <input class="input" type="datetime-local" id="dateDeactivated"><br><br>

        <button class="laptopBtn" id="addLaptopBtn">Add Laptop</button>

        <p class="laptopOutput" id="laptopOutput"></p>
    </div>

    <div class="laptopCreator">
        <h2 class="resText">Deactivate Laptop</h2>

        <input class="input" type="text" id="laptopMakeD" placeholder="Laptop Make"><br>
        <input class="input" type="text" id="laptopModelD" placeholder="Laptop Model"><br>
        <input class="input" type="text" id="laptopId" placeholder="Laptop Id"><br>

        <label>Date Deactivated:</label><br>
        <input class="input" type="datetime-local" id="dateDeactivatedD" disabled><br><br>

        <button class="laptopBtn" id="deactLaptopBtn">Deactivate</button>

        <p class="laptopOutput" id="laptopOutputD"></p>
    </div>


        </div>
    
        <script src="/controllers/adminController.js"></script>
    </body>
</html>
