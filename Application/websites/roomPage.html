<!--home page of our website, for now a test button is added to test if it connects to our sql database-->
<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="styles/roomStyle.css">
    <title>KStateReservations</title>
    <header class="header">
        <div class="leftHeader">
            <img src="/websitePics/Kansas-State-Wildcats-logo.png" alt="KStateLogo" width="60" height="30">
            <div class="dividerLine"></div>
            <h1>Carl R. Ice College of Engineering</h1>
        </div>
        
    </header>

    <body>
        <div class="container">
        <img  class="engPhoto" src="/websitePics/inside-eng-budiling.jpg" height="150px">
        <h1 class="engPhotoText">Room Checkout</h1>
        <header class="resOptions">
            <h2 class="resText">Reservations -</h2>
        <select class="select" id="reservationType">
            <option value="Rooms" selected>Rooms</option>
            <option value="Laptops">Laptops</option>
        </select>
        </header>
        
        <div class="date-selector">
            <label class="highlightBlocks" for="reservationDate">Select Date:</label>
            <input type="date" id="reservationDate">
        </div>
        <div class="calendar" id="calendar-container"></div>
        <h3 class="highlightBlocks" id="selection-output" >Highlight blocks to select a time!</h3>
        </div>
    
        <script src="controllers/roomController.js"></script>
    </body>
</html>
