<!--home page of our website, for now a test button is added to test if it connects to our sql database-->
<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="styles/laptopStyle.css">
    <title>KStateReservations</title>
    <header class="header">
        <div class="leftHeader">
            <img src="/websitePics/Kansas-State-Wildcats-logo.png" alt="KStateLogo" width="60" height="30">
            <div class="dividerLine"></div>
            <h1>Carl R. Ice College of Engineering</h1>
        </div>
        
    </header>

    <body>
        <div class="container">
        <img  class="engPhoto" src="/websitePics/inside-eng-budiling.jpg" height="150px">
        <h1 class="engPhotoText">Laptop Checkout</h1>
        <header class="resOptions">
            <h2 class="resText">Reservations -</h2>
        <select class="select" id="reservationType">
            <option value="Rooms">Rooms</option>
            <option value="Laptops" selected>Laptops</option>
        </select>
        <button class="editRes" id="editRes">Current Reservations</button>
        <button class="logOut" onclick="logOut()">Log Out</button>
        </header>
        
        <div class="date-selector">
            <label class="highlightBlocks" for="reservationDate">Select Date:</label>
            <input type="date" id="reservationDate">
        </div>
        <div class="calendar" id="calendar-container"></div>
        <h3 class="highlightBlocks" id="selection-output" >Highlight blocks to select a time!</h3>
        <div class="confirmDiv">
            <button id="confirmRes" class="confirmButton" onclick="openModal()">Confirm Reservation</button>
        </div>

        <div id="reservationModal" class="overlay">
            <div class="content">
                <div id="passwordStep">
                    <h3>Create a Room Password</h3>
                    <p>Confirming reservation for: <strong id="displayEmail"></strong></p>
                    <p>selected time: <strong id="displayTime"></strong></p>
                    <div class="buttons">
                        <button onclick="closeModal()" class="cancelButton">Cancel</button>
                        <button id="submitBtn" onclick="submitReservation()" class="confirmButton">Submit</button>
                    </div>
                </div>

                <div id="successStep" style="display: none;">
                    <h3>Reservation Confirmed!</h3>
                    <h3 id="stayLog">Would you like to stay or log out?</h3>
                    <div class="buttons">
                        <button id="stay" onclick="closeModal()" class="cancelButton">Stay</button>
                        <button id="logBtn" onclick="logOut()" class="confirmButton">Log Out</button>
                    </div>
                </div>
            </div>
        </div>
        </div>
        
    
        <script src="controllers/laptopController.js"></script>
    </body>
</html>
