<!--home page of our website, for now a test button is added to test if it connects to our sql database-->
<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="/styles/homestyle.css">
    <title>KStateReservations</title>
    <header class="header">
        <div class="leftHeader">
            <img src="/websitePics/Kansas-State-Wildcats-logo.png" alt="KStateLogo" width="60" height="30">
            <div class="dividerLine"></div>
            <h1>Carl R. Ice College of Engineering</h1>
        </div>
        
    </header>

    <body>
        <div class="container">
            <img class="engPhoto" src="/websitePics/inside-eng-budiling.jpg" height="150px">
            <h1 class="engPhotoText">Room and Laptop Checkout</h1>

            <h2 class="resText">Reservations</h2>
            <p class="pleaseLogin">Sign in to access the reservation calendar for study rooms and laptop checkout.</p>
            <div class="inputBox">
                <input type="text" placeholder="Email" id="emailLogin" required>
            </div>
            <div class="inputBox">
                <input type="password" placeholder="Password" id="passLogin">
            </div>
            <div class="loginBtn">
                <button type="button" id="loginBtn">Login</button>
                <button type="button" id="adminLoginBtn" class="adminLoginBtn">Admin Login</button>
                <script src="/controllers/homeController.js"></script>
                <p id="loginOutput"></p>
            </div>

        </div>
    
        <script src="/controllers/homeController.js"></script>
    </body>
</html>
